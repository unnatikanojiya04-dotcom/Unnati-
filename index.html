<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorcerer Supreme — Magic Shield AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ember: #FF6B00; --gold: #FFB347; --spark: #FFE066; --glow: #FF8C00;
  }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Cinzel',serif; }

  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
    background:radial-gradient(ellipse at center,#1a0400 0%,#000 80%);
    z-index:20; transition:opacity .6s ease;
  }
  #overlay h1 {
    font-size:clamp(1.2rem,5vw,2.4rem); font-weight:900;
    letter-spacing:.2em; text-transform:uppercase;
    color:var(--ember); text-shadow:0 0 30px var(--ember),0 0 60px var(--gold);
    text-align:center; padding:0 20px;
  }
  #overlay p {
    color:#cc8844; letter-spacing:.1em; font-size:.85rem;
    max-width:340px; text-align:center; line-height:1.8; padding:0 20px;
  }
  #startBtn {
    padding:14px 40px; border:2px solid var(--ember); background:transparent;
    color:var(--gold); font-family:'Cinzel',serif; font-size:1rem;
    letter-spacing:.18em; text-transform:uppercase; cursor:pointer;
    transition:background .3s,color .3s,box-shadow .3s;
  }
  #startBtn:active { background:var(--ember); color:#000; box-shadow:0 0 30px var(--ember); }

  #errBox {
    display:none; background:rgba(180,20,0,.85); color:#fff;
    padding:14px 20px; border-radius:8px; font-size:.8rem;
    max-width:300px; text-align:center; line-height:1.6; letter-spacing:.05em;
  }

  #container { position:relative; width:100vw; height:100vh; display:none; }
  #webcam {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
  }
  #shield-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #status {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    color:var(--gold); font-size:.7rem; letter-spacing:.18em;
    text-transform:uppercase; opacity:.75; text-shadow:0 0 10px var(--ember);
    white-space:nowrap;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>✦ Sorcerer Supreme ✦</h1>
  <p>Open your palm toward the camera.<br/>The shield of the Vishanti will manifest.</p>
  <button id="startBtn">Invoke the Mandalay</button>
  <div id="errBox"></div>
</div>

<div id="container">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="shield-canvas"></canvas>
  <div id="status">Loading hand detector…</div>
</div>

<!-- MediaPipe Hands via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script>
const COLORS = { ember:'#FF6B00', gold:'#FFB347', spark:'#FFE066', white:'#FFF5E0' };

let canvas, ctx, videoEl, statusEl;
let palmX=0, palmY=0, palmR=100;
let targetX=0, targetY=0, targetR=100;
let handVisible=false;
let rot1=0, rot2=0, rot3=0;
let sparkles=[], tick=0;
let handsReady=false;

// ── START BUTTON ──────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  startCamera();
});

async function startCamera() {
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';

  // Request camera — try rear camera first on mobile, fallback to any
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
  } catch(e1) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    } catch(e2) {
      errBox.style.display = 'block';
      errBox.textContent = '⚠️ Camera blocked. Go to your browser Settings → Site Settings → Camera → Allow for this site, then tap the button again.';
      return;
    }
  }

  // Hide overlay, show container
  const overlay = document.getElementById('overlay');
  overlay.style.opacity = '0';
  setTimeout(() => { overlay.style.display='none'; }, 600);
  document.getElementById('container').style.display = 'block';

  videoEl   = document.getElementById('webcam');
  canvas    = document.getElementById('shield-canvas');
  ctx       = canvas.getContext('2d');
  statusEl  = document.getElementById('status');

  videoEl.srcObject = stream;
  await videoEl.play();

  resize();
  window.addEventListener('resize', resize);

  initMediaPipe();
  requestAnimationFrame(loop);
}

// ── MEDIAPIPE ─────────────────────────────────────────────────────────────────
function initMediaPipe() {
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,           // 0 = lite, faster on mobile
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });
  hands.onResults(onResults);

  // Feed frames manually — no Camera utility needed
  async function sendFrame() {
    if (videoEl && videoEl.readyState >= 2) {
      try { await hands.send({ image: videoEl }); } catch(_) {}
    }
    setTimeout(sendFrame, 80); // ~12 fps — gentle on mobile
  }

  hands.initialize().then(() => {
    handsReady = true;
    statusEl.textContent = 'Awaiting hand…';
    sendFrame();
  }).catch(() => {
    // initialize() might not exist on all versions — just start sending
    handsReady = true;
    statusEl.textContent = 'Awaiting hand…';
    sendFrame();
  });
}

// ── MEDIAPIPE RESULTS ─────────────────────────────────────────────────────────
function onResults(results) {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    handVisible = false;
    if (statusEl) statusEl.textContent = 'Awaiting hand…';
    return;
  }
  handVisible = true;
  if (statusEl) statusEl.textContent = '✦ Shield Active ✦';

  const lm = results.multiHandLandmarks[0];
  const W = canvas.width, H = canvas.height;
  const mx = lx => (1 - lx) * W;
  const my = ly => ly * H;

  const pts = [0,5,9,13,17].map(i => ({ x:mx(lm[i].x), y:my(lm[i].y) }));
  const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
  const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;

  const dx = mx(lm[9].x)-mx(lm[0].x);
  const dy = my(lm[9].y)-my(lm[0].y);
  targetX = cx; targetY = cy;
  targetR = Math.sqrt(dx*dx+dy*dy)*1.35;
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize() {
  if(!canvas) return;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ── SPARKLES ──────────────────────────────────────────────────────────────────
function spawnSparkle(cx,cy,r) {
  const a=Math.random()*Math.PI*2, d=r*(.5+Math.random()*.6);
  sparkles.push({
    x:cx+Math.cos(a)*d, y:cy+Math.sin(a)*d,
    vx:(Math.random()-.5)*1.2, vy:(Math.random()-.5)*1.2,
    life:1, decay:.018+Math.random()*.025,
    size:1.5+Math.random()*3,
    color:Math.random()<.5?COLORS.spark:COLORS.gold
  });
}
function updateSparkles() {
  for(let s of sparkles){s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;}
  sparkles=sparkles.filter(s=>s.life>0);
}
function drawSparkles() {
  for(let s of sparkles){
    ctx.save();
    ctx.globalAlpha=s.life*.9;
    ctx.fillStyle=s.color; ctx.shadowColor=s.color; ctx.shadowBlur=8;
    const sz=s.size*s.life;
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, r=i%2===0?sz:sz*.35;
      i===0?ctx.moveTo(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r)
           :ctx.lineTo(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}

// ── SHIELD ────────────────────────────────────────────────────────────────────
function drawShield(cx,cy,r) {
  ctx.save(); ctx.translate(cx,cy);

  // bg disc
  const bg=ctx.createRadialGradient(0,0,0,0,0,r);
  bg.addColorStop(0,'rgba(255,120,0,.18)');
  bg.addColorStop(.6,'rgba(255,70,0,.10)');
  bg.addColorStop(1,'rgba(255,40,0,0)');
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();

  drawRing(r*.92,6,rot1,24,COLORS.ember,14,1.5);
  drawRuneRing(r*.70,rot2,16);
  drawRing(r*.50,4,rot3,32,COLORS.gold,10,1.2);
  drawSpokes(r*.85,8,rot1);
  drawInnerGeometry(r*.42,rot2*1.5);
  drawCentreSigil(r*.18);

  const pulse=.7+.3*Math.sin(tick*.06);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle=COLORS.ember; ctx.lineWidth=2*pulse;
  ctx.shadowColor=COLORS.ember; ctx.shadowBlur=40*pulse;
  ctx.stroke(); ctx.restore();
}

function drawRing(r,lineW,angle,dashCount,color,glowB,glowW) {
  ctx.save(); ctx.rotate(angle);
  ctx.strokeStyle=color; ctx.lineWidth=lineW;
  ctx.shadowColor=color; ctx.shadowBlur=glowB*(1+glowW*Math.sin(tick*.07));
  const dl=(2*Math.PI*r)/(dashCount*2);
  ctx.setLineDash([dl*1.3,dl*.7]);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=1; ctx.shadowBlur=glowB*.4; ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

const RUNES=['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ'];
function drawRuneRing(r,angle,count) {
  ctx.save(); ctx.rotate(angle);
  ctx.strokeStyle=COLORS.gold; ctx.lineWidth=2;
  ctx.shadowColor=COLORS.gold; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=COLORS.spark; ctx.shadowBlur=12;
  ctx.font=`${r*.18}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2;
    ctx.save(); ctx.rotate(a); ctx.translate(r,0); ctx.rotate(-a-angle);
    ctx.fillText(RUNES[i%RUNES.length],0,0); ctx.restore();
  }
  ctx.restore();
}

function drawSpokes(r,n,angle) {
  ctx.save(); ctx.rotate(angle);
  ctx.strokeStyle=COLORS.ember; ctx.lineWidth=1.5;
  ctx.shadowColor=COLORS.ember; ctx.shadowBlur=20; ctx.globalAlpha=.5;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); ctx.stroke();
  }
  ctx.restore();
}

function drawInnerGeometry(r,angle) {
  ctx.save(); ctx.rotate(angle);
  ctx.strokeStyle=COLORS.gold; ctx.lineWidth=1.5;
  ctx.shadowColor=COLORS.gold; ctx.shadowBlur=16;
  for(let flip=0;flip<2;flip++){
    ctx.beginPath();
    for(let i=0;i<=3;i++){
      const a=(i/3)*Math.PI*2+(flip?Math.PI/3:0);
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke();
  }
  ctx.beginPath();
  for(let i=0;i<=6;i++){
    const a=(i/6)*Math.PI*2;
    i===0?ctx.moveTo(Math.cos(a)*r*.6,Math.sin(a)*r*.6):ctx.lineTo(Math.cos(a)*r*.6,Math.sin(a)*r*.6);
  }
  ctx.closePath(); ctx.stroke(); ctx.restore();
}

function drawCentreSigil(r) {
  const pulse=.85+.15*Math.sin(tick*.1);
  const cg=ctx.createRadialGradient(0,0,0,0,0,r);
  cg.addColorStop(0,COLORS.spark); cg.addColorStop(.5,COLORS.gold); cg.addColorStop(1,'rgba(255,100,0,0)');
  ctx.beginPath(); ctx.arc(0,0,r*pulse,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.shadowColor=COLORS.spark; ctx.shadowBlur=30; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,r*1.2*pulse,0,Math.PI*2);
  ctx.strokeStyle=COLORS.spark; ctx.lineWidth=1.5; ctx.shadowBlur=20; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r*.8,0); ctx.lineTo(r*.8,0);
  ctx.moveTo(0,-r*.8); ctx.lineTo(0,r*.8);
  ctx.lineWidth=1; ctx.strokeStyle=COLORS.white; ctx.shadowColor=COLORS.white; ctx.shadowBlur=10; ctx.stroke();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop() {
  tick++;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(handVisible){
    palmX+=(targetX-palmX)*.14; palmY+=(targetY-palmY)*.14; palmR+=(targetR-palmR)*.12;
    rot1+=.004; rot2-=.007; rot3+=.013;
    if(tick%3===0) spawnSparkle(palmX,palmY,palmR);
  } else {
    palmR+=(80-palmR)*.05;
    rot1+=.001; rot2-=.002; rot3+=.003;
  }

  updateSparkles(); drawSparkles();

  if(handVisible||palmR>30){
    ctx.globalAlpha=handVisible?1:Math.max(0,(palmR-30)/50);
    drawShield(palmX,palmY,palmR);
    ctx.globalAlpha=1;
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
